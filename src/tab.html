<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article Summary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --border:       #30363d;
      --text-primary: #cdd9e5;
      --text-secondary:#8b949e;
      --text-muted:   #484f58;
      --accent:       #7c83f0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.85;
      -webkit-font-smoothing: antialiased;
      padding: 48px 24px 100px;
    }

    main {
      max-width: 700px;
      margin: 0 auto;
    }

    /* Header */
    .page-header {
      margin-bottom: 36px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
      letter-spacing: -0.2px;
    }

    .article-url {
      font-size: 12px;
      color: var(--text-muted);
      word-break: break-all;
      line-height: 1.5;
    }

    /* Metrics */
    .metrics {
      display: flex;
      gap: 20px;
      margin-bottom: 44px;
      padding: 14px 18px;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .metric {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .metric-label {
      font-size: 12px;
      color: var(--text-secondary);
      width: 48px;
      flex-shrink: 0;
    }

    .metric-bar {
      flex: 1;
      height: 5px;
      background: #21262d;
      border-radius: 99px;
      overflow: hidden;
    }

    .metric-fill {
      height: 100%;
      border-radius: 99px;
    }

    .metric-val {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      width: 32px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Summary sections */
    .summary-section {
      margin-bottom: 48px;
    }

    .section-heading {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .section-text {
      font-size: 16px;
      line-height: 1.9;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .section-text p {
      margin: 0 0 1.1em 0;
    }

    .section-text p:last-child {
      margin-bottom: 0;
    }

    /* Loading */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding-top: 120px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error {
      max-width: 520px;
      margin: 120px auto;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading summary…</p>
  </div>

  <main id="content" style="display:none">
    <header class="page-header">
      <div class="logo">✦ Article Summary</div>
      <p id="articleUrl" class="article-url"></p>
    </header>

    <div id="metrics" class="metrics"></div>

    <div id="summaryContent"></div>
  </main>

  <p id="error" class="error" style="display:none"></p>

  <script src="tab.js"></script>
</body>
</html>
